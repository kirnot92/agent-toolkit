name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore AgentToolkit.slnx

      - name: Build
        run: dotnet build AgentToolkit.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test AgentToolkit.slnx --configuration Release --no-build --verbosity normal

      - name: Pack AgentToolkit
        run: dotnet pack AgentToolkit/AgentToolkit.csproj --configuration Release --no-build --output artifacts

      - name: Pack AgentToolkit.Mcp
        run: dotnet pack AgentToolkit.Mcp/AgentToolkit.Mcp.csproj --configuration Release --no-build --output artifacts
